<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analisis Sarana Pendidikan Kota Semarang</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* RESET & BASE STYLES */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        html {
            scroll-behavior: smooth;
            scroll-padding-top: 90px; /* Jarak pas saat scroll ke section */
        }

        body {
            background-color: #faf8f5;
            color: #2b2927;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            line-height: 1.6;
        }

        /* NAVBAR (NAVIGASI ATAS) */
        .navbar {
            background-color: rgba(27, 58, 36, 0.95);
            border-bottom: 1px solid rgba(166, 124, 82, 0.3);
            padding: 15px 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            z-index: 1000;
            backdrop-filter: blur(12px);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.05);
        }

        .brand-logo {
            font-size: 1.25rem;
            font-weight: 800;
            color: #ffffff;
            display: flex;
            align-items: center;
            gap: 12px;
            letter-spacing: -0.5px;
        }

        .brand-logo i {
            color: #a67c52;
            font-size: 1.4rem;
        }

        .brand-logo span {
            color: #a67c52;
            font-weight: 400;
        }

        /* Menu Navigasi */
        .nav-menu {
            display: flex;
            list-style: none;
            gap: 25px;
            align-items: center;
        }

        .nav-menu a {
            color: #e3dec3;
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 500;
            transition: all 0.3s ease;
            position: relative;
            padding: 6px 0;
        }

        /* Efek garis bawah dinamis menggunakan class .active */
        .nav-menu a::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 0;
            height: 2.5px; /* Ketebalan garis */
            background-color: #a67c52; /* Warna kuning/emas kayu */
            transition: width 0.3s ease;
        }

        /* Hanya muncul jika menu memiliki class active */
        .nav-menu a.active::after {
            width: 100%;
        }

        .nav-menu a:hover, .nav-menu a.active {
            color: #ffffff;
        }

        /* Tombol Hamburger Menu untuk Mobile */
        .menu-toggle {
            display: none;
            flex-direction: column;
            gap: 5px;
            cursor: pointer;
            background: none;
            border: none;
        }

        .menu-toggle span {
            display: block;
            width: 25px;
            height: 3px;
            background-color: #ffffff;
            border-radius: 2px;
            transition: 0.3s;
        }

        /* HERO HEADER SECTION */
        .hero-section {
            background: linear-gradient(135deg, #1b3a24 0%, #0f2416 100%);
            position: relative;
            padding: 140px 20px 80px 20px;
            text-align: center;
            color: #ffffff;
            overflow: hidden;
        }

        .hero-section::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background-image: radial-gradient(rgba(166, 124, 82, 0.15) 1px, transparent 0);
            background-size: 24px 24px;
            opacity: 0.7;
        }

        .hero-content {
            position: relative;
            max-width: 850px;
            margin: 0 auto;
            z-index: 2;
        }

        .sub-tag {
            color: #1b3a24;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-size: 0.75rem;
            font-weight: 700;
            margin-bottom: 20px;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background-color: #e9e0d2;
            padding: 6px 16px;
            border-radius: 30px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .hero-content h1 {
            font-size: 2.5rem;
            font-weight: 800;
            line-height: 1.3;
            margin-bottom: 20px;
            letter-spacing: -1px;
            color: #ffffff;
        }

        .hero-content h1 span {
            color: #a67c52;
            background: linear-gradient(to right, #e9e0d2, #a67c52);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .description {
            color: #ced9cf;
            font-size: 1.05rem;
            line-height: 1.7;
            max-width: 700px;
            margin: 0 auto;
        }

        /* MAIN CONTENT WRAPPER */
        .main-container {
            width: 100%;
            max-width: 1140px;
            margin: -40px auto 0 auto;
            padding: 0 20px 80px 20px;
            position: relative;
            z-index: 10;
        }

        /* REPORT / DOKUMENTASI BOX */
        .report-section {
            text-align: left;
            background: #ffffff;
            border: 1px solid rgba(166, 124, 82, 0.15);
            border-radius: 24px;
            padding: 40px;
            box-shadow: 0 20px 40px rgba(27, 58, 36, 0.04);
            margin-bottom: 40px;
        }

        .report-block {
            margin-bottom: 35px;
        }

        .report-block:last-child {
            margin-bottom: 0;
        }

        .report-block h3 {
            font-size: 1.3rem;
            font-weight: 700;
            color: #1b3a24;
            margin-bottom: 18px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .report-block h3 i {
            color: #a67c52;
            background: #faf5ef;
            padding: 10px;
            border-radius: 12px;
            font-size: 1.1rem;
        }

        .report-block p {
            color: #524f4c;
            font-size: 0.98rem;
            line-height: 1.8;
            text-align: justify;
        }

        /* VISUAL FLOWCHART METODOLOGI */
        .methodology-flowchart {
            display: flex;
            align-items: center;
            justify-content: flex-start;
            gap: 15px;
            margin-top: 35px;
            padding: 20px;
            background: #faf7f2;
            border-radius: 16px;
            border: 1px dashed rgba(166, 124, 82, 0.25);
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
        }

        .flow-step {
            background: #1b3a24;
            color: #ffffff;
            padding: 12px 20px;
            border-radius: 10px;
            font-weight: 700;
            font-size: 0.85
